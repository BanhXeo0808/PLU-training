<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLU Leaderboard Admin</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 80px auto;
      padding: 0 1rem;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p.sub { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    #reset-scores-btn {
      padding: 0.6rem 1.2rem;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #reset-scores-btn:disabled {
      background: #fca5a5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>Admin – Reset leaderboard</h1>
  <p class="sub">This will permanently delete all scores from both leaderboards.</p>
  <button id="reset-scores-btn">Reset ALL scores</button>
  <p id="status"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPKiEPTU44_FtBiDbM0O7hBjvgHdrp_Pk",
      authDomain: "youngs-plu-training.firebaseapp.com",
      projectId: "youngs-plu-training",
      storageBucket: "youngs-plu-training.firebasestorage.app",
      messagingSenderId: "614316009281",
      appId: "1:614316009281:web:127a2cdb75f96f9ab7a3c0",
      measurementId: "G-M1S0LE5X3F"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const resetBtn = document.getElementById("reset-scores-btn");
    const statusEl = document.getElementById("status");

    resetBtn.addEventListener("click", async () => {
      const ok = confirm("Reset ALL scores for both leaderboards?");
      if (!ok) return;

      resetBtn.disabled = true;
      statusEl.textContent = "Clearing scores...";

      try {
        const snap = await getDocs(collection(db, "scores"));
        const count = snap.size;
        await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "scores", d.id))));
        statusEl.textContent = `Done — ${count} score${count !== 1 ? "s" : ""} deleted.`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error clearing scores.";
      } finally {
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
